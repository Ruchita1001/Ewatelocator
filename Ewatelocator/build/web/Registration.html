<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link rel="stylesheet" href="Registration.css">
</head>
<body>
    <section class="header">
        <nav>
            <div class="nav-links">
                <ul>
                    <li><a href="index.html">HOME</a></li>
                    <li><a href="">ABOUT</a></li>
                    <li><a href="login.html">LOGIN</a></li>
                   <li><a href="">CONTACT</a></li>
                </ul>
            </div>
        </nav>
    </section>

    <section class="container">
        <header>Registration Form</header>
        <form action="connect.jsp" method="post" class="form">
            <div class="input-box">
                <label>Full Name</label>
                <input type="text" name="uname" placeholder="Enter your Name" required>
            </div>

            <div class="input-box">
                <label>Email Address</label>
                <input type="email" name="mail" placeholder="Enter your Email Address" required>
            </div>

            <div class="input-box">
                <label>Password</label>
                <input type="password" name="pass" placeholder="Enter your Password" required>
            </div>

            <div class="input-box">
                <label>Phone Number</label>
                <input type="text" name="phono" placeholder="Enter your Phone Number" required>
            </div>

            <div class="input-box">
                <label>Address</label>
                <input type="text" name="add" placeholder="Enter your Address" required>
            </div>

            <div class="input-box">
                <label>Date</label>
                <input type="date" name="da" required>
            </div>

            <div class="button">
                <input type="submit" value="Register" class="submit">
            </div>
        </form>
    </section>
</body>
</html>
